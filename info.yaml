# Tiny Tapeout project information
project:
  title:        "MorseCodeToHex"      # Project title
  author:       "Noah Laforet"      # Your name
  discord:      "rap.id"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Takes in an input of dashes and dots and converts them to hexadecimal output"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_morse_to_hex"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_morse_to_hex.v"
    - "morseToHex.v"
    - "hexto7seg.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "dot button"
  ui[1]: "dash button"
  ui[2]: "confirm button"
  ui[3]: "clear button"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "7-seg segment A (active low)"
  uo[1]: "7-seg segment B (active low)"
  uo[2]: "7-seg segment C (active low)"
  uo[3]: "7-seg segment D (active low)"
  uo[4]: "7-seg segment E (active low)"
  uo[5]: "7-seg segment F (active low)"
  uo[6]: "7-seg segment G (active low)"
  uo[7]: "error LED (high = invalid morse sequence)"

  # Bidirectional pins
  uio[0]: "morse buffer LED 0 (1=dash, 0=dot)"
  uio[1]: "morse buffer LED 1 (1=dash, 0=dot)"
  uio[2]: "morse buffer LED 2 (1=dash, 0=dot)"
  uio[3]: "morse buffer LED 3 (1=dash, 0=dot)"
  uio[4]: "morse buffer LED 4 (1=dash, 0=dot)"
  uio[5]: "symbol count bit 0"
  uio[6]: "symbol count bit 1"
  uio[7]: "symbol count bit 2"

# Do not change!
yaml_version: 6
